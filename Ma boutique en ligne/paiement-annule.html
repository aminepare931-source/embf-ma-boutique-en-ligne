<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Paiement Annulé — EMBF Boutique</title>
<link rel="icon" type="image/png" href="data:image/png;base64,...">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#03030a;--s1:#0c0c1d;--s2:#13132a;--a1:#00e5ff;--a2:#8b5cf6;--a3:#f43f5e;--gold:#fbbf24;--txt:#f1f1ff;--muted:#8888aa;--border:rgba(0,229,255,.12);--green:#22c55e;--red:#ef4444;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:Outfit,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:22px;padding:30px 24px;max-width:420px;width:100%;text-align:center;}
.icon-wrap{font-size:2.8rem;margin-bottom:10px;}
.title{font-family:Bebas\ Neue,sans-serif;font-size:1.7rem;letter-spacing:.06em;color:var(--a3);margin-bottom:10px;}
.sub{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:16px;}
.pay-methods{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;}
.pm{background:var(--s2);border:1px solid var(--border);border-radius:50px;padding:5px 12px;font-size:.76rem;font-weight:600;color:var(--muted);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.btn-retry{width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;color:#000;padding:13px;border-radius:12px;font-family:Outfit,sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px;}
.btn-retry:active{opacity:.85;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);color:#25d366;padding:12px;border-radius:12px;font-family:Outfit,sans-serif;font-weight:700;font-size:.85rem;text-decoration:none;margin-bottom:8px;}
.btn-wa:active{background:rgba(37,211,102,.2);}
.btn-home{display:block;color:var(--muted);text-decoration:none;font-size:.84rem;font-weight:600;padding:10px;}
.btn-home:hover{color:var(--a1);}
@media(min-width:600px){.card{padding:40px 36px;}.title{font-size:2rem;}}
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">❌</div>
  <div class="title">PAIEMENT ANNULÉ</div>
  <p class="sub">Votre paiement a été annulé ou n'a pas abouti. Votre commande n'a pas été traitée. Aucun montant n'a été débité.</p>
  <p style="font-size:.84rem;color:var(--muted);margin-bottom:14px;">Vous pouvez réessayer avec un autre moyen de paiement :</p>
  <div class="pay-methods">
    <span class="pm">🟠 Orange Money</span>
    <span class="pm">🔵 Moov Money</span>
    <span class="pm">🌊 Wave</span>
    <span class="pm">💳 Carte</span>
    <span class="pm">🅿️ PayPal</span>
    <span class="pm">💵 Espèces</span>
  </div>
  <div class="divider"></div>
  <button class="btn-retry" onclick="history.back()">🔄 Réessayer le paiement</button>
  <a href="https://wa.me/22655300868?text=Bonjour%20!%20J%27ai%20eu%20un%20problème%20de%20paiement%2C%20pouvez-vous%20m%27aider%20?" target="_blank" class="btn-wa">💬 Aide via WhatsApp</a>
  <a href="produits.html" class="btn-home">← Retour aux produits</a>
</div>
</body>
</html>
